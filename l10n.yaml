# Configuración del generador de localizaciones de Flutter.
# Se ejecuta automáticamente con `flutter pub get` y `flutter run`.
#
# Para añadir un nuevo idioma:
#   1. Crea lib/l10n/app_<codigo>.arb (ej. app_qu.arb para quechua).
#   2. Copia las claves de app_es.arb y traduce los valores.
#   3. Las claves faltantes hacen fallback al idioma plantilla (es).

arb-dir: lib/l10n
template-arb-file: app_es.arb
output-localization-file: app_localizations.dart
output-class: AppLocalizations
nullable-getter: false
output-dir: lib/l10n
