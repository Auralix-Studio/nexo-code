name: Multi-Platform Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            os: ubuntu-latest
          - target: windows
            os: windows-latest
          - target: linux
            os: ubuntu-latest
          - target: macos
            os: macos-latest
          - target: ios
            os: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Linux Dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android
        if: matrix.target == 'android'
        run: |
          flutter build apk --release
          flutter build apk --split-per-abi --release
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/nexo-${{ github.ref_name }}-universal.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/nexo-${{ github.ref_name }}-armv7.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/nexo-${{ github.ref_name }}-arm64.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk dist/nexo-${{ github.ref_name }}-x86_64.apk

      - name: Build Windows
        if: matrix.target == 'windows'
        run: |
          flutter build windows --release
          mkdir -p dist
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "dist\nexo-${{ github.ref_name }}-windows-x64.zip" -Force
          # Setup warp-packer
          Invoke-WebRequest -Uri 'https://github.com/dgiagio/warp/releases/download/v0.3.0/windows-x64.warp-packer.exe' -OutFile 'warp-packer.exe'
          & .\warp-packer.exe --arch windows-x64 --input_dir "build\windows\x64\runner\Release" --exec nexo.exe --output "dist\nexo-${{ github.ref_name }}-setup-x64.exe"
          # Patch PE Header
          $bytes = [System.IO.File]::ReadAllBytes("dist\nexo-${{ github.ref_name }}-setup-x64.exe")
          $peHeaderOffset = [BitConverter]::ToInt32($bytes, 0x3C)
          $subsystemOffset = $peHeaderOffset + 0x5C
          if ($bytes[$subsystemOffset] -eq 3) {
            $bytes[$subsystemOffset] = 2
            [System.IO.File]::WriteAllBytes("dist\nexo-${{ github.ref_name }}-setup-x64.exe", $bytes)
          }

      - name: Build Linux
        if: matrix.target == 'linux'
        run: |
          flutter build linux --release
          mkdir -p dist
          cd build/linux/x64/release/bundle
          tar -czvf ../../../../../dist/nexo-${{ github.ref_name }}-linux-x64.tar.gz *
          cd ../../../../../

      - name: Build macOS
        if: matrix.target == 'macos'
        run: |
          flutter build macos --release
          mkdir -p dist
          cd build/macos/Build/Products/Release
          zip -r ../../../../../dist/nexo-${{ github.ref_name }}-macos.zip nexo.app
          cd ../../../../../

      - name: Build iOS (Unsigned)
        if: matrix.target == 'ios'
        run: |
          flutter build ios --release --no-codesign
          mkdir -p dist
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r ../../../dist/nexo-${{ github.ref_name }}-ios-unsigned.ipa Payload
          cd ../../../

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          repository: Auralix-Studio/nexo
          files: dist/*
          token: ${{ secrets.ORG_GITHUB_TOKEN }}
